<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Zepto BB</title>
    <!-- Tailwind CSS -->
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <!-- Telegram Web App SDK -->
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
</head>
<body class="bg-slate-900 text-white min-h-screen flex flex-col justify-between font-sans">

    <!-- Header Section -->
    <header class="p-4 border-b border-slate-800 flex justify-between items-center bg-slate-950">
        <h1 class="text-xl font-bold tracking-wider text-amber-500">ZEPTO BB</h1>
        <div id="user-display" class="text-sm bg-slate-800 px-3 py-1 rounded-full text-slate-300">
            Loading player...
        </div>
    </header>

    <!-- Main Content Display -->
    <main class="flex-1 p-4 flex flex-col items-center justify-center">
        
        <!-- Shop Tab Content -->
        <div id="shop-tab" class="w-full max-w-md bg-slate-950 p-6 rounded-2xl border border-slate-800 text-center">
            <h2 class="text-2xl font-bold mb-2">BB Item Shop</h2>
            <p class="text-slate-400 mb-6 text-sm">Upgrade your gear and boosts.</p>
            <button class="w-full bg-amber-500 hover:bg-amber-600 text-slate-950 font-bold py-3 px-4 rounded-xl transition shadow-lg shadow-amber-500/20">
                Buy Starter Pack
            </button>
        </div>

        <!-- Wallet Tab Content (Hidden by default) -->
        <div id="wallet-tab" class="w-full max-w-md bg-slate-950 p-6 rounded-2xl border border-slate-800 text-center hidden">
            <h2 class="text-2xl font-bold mb-2">Your Wallet</h2>
            <div class="text-4xl font-black text-emerald-400 my-4">0.00 TON</div>
            <button class="w-full bg-emerald-500 hover:bg-emerald-600 text-slate-950 font-bold py-3 px-4 rounded-xl transition">
                Connect Wallet
            </button>
        </div>

        <!-- Profile Tab Content (Hidden by default) -->
        <div id="profile-tab" class="w-full max-w-md bg-slate-950 p-6 rounded-2xl border border-slate-800 text-center hidden">
            <h2 class="text-2xl font-bold mb-2">Player Profile</h2>
            <p id="profile-username" class="text-slate-300 text-lg font-medium mb-4">@username</p>
            <div class="bg-slate-900 p-3 rounded-xl border border-slate-800 text-sm text-slate-400">
                Status: Verified Beta User
            </div>
        </div>

    </main>

    <!-- Navigation Footer Tabs -->
    <footer class="bg-slate-950 border-t border-slate-800 p-2 grid grid-cols-3 gap-2 text-center sticky bottom-0">
        <button onclick="switchTab('shop')" class="py-2 text-sm font-bold text-amber-500 focus:outline-none">Shop</button>
        <button onclick="switchTab('wallet')" class="py-2 text-sm font-bold text-slate-400 focus:outline-none">Wallet</button>
        <button onclick="switchTab('profile')" class="py-2 text-sm font-bold text-slate-400 focus:outline-none">Profile</button>
    </footer>

    <!-- Core App Logic Script -->
    <script>
        const tg = window.Telegram.WebApp;
        tg.ready();
        tg.expand(); // Forces full screen inside Telegram

        const user = tg.initDataUnsafe?.user;
        if (user) {
            document.getElementById('user-display').innerText = user.first_name;
            document.getElementById('profile-username').innerText = user.username ? '@' + user.username : user.first_name;
        } else {
            document.getElementById('user-display').innerText = "Web Preview";
            document.getElementById('profile-username').innerText = "@local_player";
        }

        function switchTab(tabName) {
            const tabs = ['shop', 'wallet', 'profile'];
            tabs.forEach(tab => {
                const element = document.getElementById(`${tab}-tab`);
                if (tab === tabName) {
                    element.classList.remove('hidden');
                } else {
                    element.classList.add('hidden');
                }
            });
        }
    </script>
</body>
</html>
